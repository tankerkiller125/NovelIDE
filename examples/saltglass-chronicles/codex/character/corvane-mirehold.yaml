summary: The greatest dark weaver of the age, who drowned fragments of his self in reliquaries to cheat
  death — and died of his own rebounding canto when the Sovereign Lens refused him.
fields:
  order: Undertow
  lineage: half-woven
  born: the year of the black tide
status:
- state: unbodied
  note: His death-canto rebounded off the infant Wren at Saltmere, unmaking his body.
- state: restored
  at:
    book: 04-the-trine-tournament
  note: Reborn in the Sablefen shallows from bone, brine, and stolen blood.
- state: dead
  at:
    book: 07-the-last-canto
  note: His own killing-canto rebounds in the tide-hall — the Sovereign Lens knew Wren for its master.
