id: the-reliquary-hunt
name: the Reliquary Hunt
type: arc
summary: The slow discovery that the Drowned King cannot die while his reliquaries endure, and the trio's
  quest to unmake each in turn.
fields:
  premise: The Drowned King has drowned his self in hidden objects.
  payoff: The last reliquary falls and Mirehold is made mortal again.
