# Run the optional NovelIDE sync server.
#
#   cd build/docker && docker compose up -d
#
# Then point the desktop app at http://<host>:8787 and register an account.
# For anything public-facing, terminate TLS at a reverse proxy (Caddy, nginx,
# Traefik) in front of this — the server speaks plain HTTP.
services:
  novelide-sync:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.sync
    image: novelide-sync:latest
    container_name: novelide-sync
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      # Set a long, random secret in production so tokens survive redeploys and
      # can't be forged. If unset, a random one is generated and persisted to
      # the data volume.
      # NOVELIDE_SYNC_SECRET: "change-me-to-a-long-random-string"

      # Set to "false" once your accounts exist to stop new sign-ups.
      NOVELIDE_SYNC_ALLOW_REGISTRATION: "true"

      # Optional tuning:
      # NOVELIDE_SYNC_MAX_BLOB_MB: "100"
      # NOVELIDE_SYNC_TOKEN_DAYS: "30"
    volumes:
      - novelide-sync-data:/data

volumes:
  novelide-sync-data:
