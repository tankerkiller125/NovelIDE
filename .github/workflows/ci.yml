name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install GTK/WebKit dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Frontend build (typecheck + bundle)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test ./internal/...

      - name: Desktop build (compile check, same tags as flatpak/wails)
        run: go build -trimpath -tags desktop,production,webkit2_41 -ldflags "-s -w" -o /tmp/novelide .

      - name: Vendored build check (what the Flathub sandbox does)
        run: |
          go mod vendor
          go build -mod=vendor -trimpath -buildvcs=false -tags desktop,production,webkit2_41 -o /tmp/novelide-vendored .
