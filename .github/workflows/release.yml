name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Each platform builds on its own native runner — Wails cannot cross-compile
# the webview layer (WebKitGTK on Linux, WebView2 on Windows, WKWebView on
# macOS). Every job uploads its archive as a workflow artifact; the final
# `release` job gathers them all and attaches them to one GitHub release.

jobs:
  linux:
    name: Linux (binary + vendored source)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Accept SemVer tags: vX.Y.Z with an optional -prerelease and/or
          # +build-metadata suffix — e.g. v1.0.0, v1.0.0-alpha.1,
          # v1.0.0-beta.1, v1.0.0-rc.1+g1a2b3c4.
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "tag '$TAG' is not a SemVer vX.Y.Z[-prerelease][+build]" >&2
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install GTK/WebKit dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # The AppStream changelog shown in software centres is taken live from the
      # GitHub release notes for this tag — nothing is hand-maintained in the
      # repo. The release already exists when this pipeline runs (the tag push
      # that triggers it comes from publishing the release), so we read its
      # body directly. This rewrites the metainfo <releases> block before the
      # tarball is packed, so both the GitHub-attached Flatpak and the Flathub
      # tarball carry the right notes.
      - name: Inject GitHub release notes into AppStream metainfo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # The published release body (falls back to generated notes, then empty).
          gh release view "$TAG" --json body -q .body > notes.md \
            || gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
                 -f tag_name="$TAG" -q .body > notes.md \
            || : > notes.md
          # Date the AppStream entry with the release's publish date, not the
          # build date (falls back to today if unavailable).
          PUB="$(gh release view "$TAG" --json publishedAt -q .publishedAt 2>/dev/null || true)"
          DATE="${PUB%%T*}"; [ -n "$DATE" ] && [ "$DATE" != "null" ] || DATE="$(date +%F)"
          VERSION="$VERSION" DATE="$DATE" \
          META="build/flatpak/dev.kilgore.NovelIDE.metainfo.xml" \
          python3 - <<'PY'
          import os, re, html
          notes = open('notes.md', encoding='utf-8').read()
          version, date, meta = os.environ['VERSION'], os.environ['DATE'], os.environ['META']

          def esc(s):
              return s.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;')

          def inline(t):
              t = re.sub(r'\s+by\s+@[\w-]+\s+in\s+\S+', '', t)   # "… by @user in <url>"
              t = re.sub(r'\[([^\]]+)\]\([^)]*\)', r'\1', t)      # [text](url) -> text
              t = re.sub(r'https?://\S+', '', t).strip()          # bare URLs
              t = esc(t)
              t = re.sub(r'`([^`]+)`', r'<code>\1</code>', t)
              t = re.sub(r'\*\*([^*]+)\*\*', r'<em>\1</em>', t)
              return t.strip()

          body, in_ul = [], False
          def close():
              global in_ul
              if in_ul:
                  body.append('        </ul>'); in_ul = False
          for raw in notes.splitlines():
              line = raw.strip()
              if not line or line.lower().startswith('**full changelog'):
                  continue
              h = re.match(r'#{1,6}\s+(.*)', line)
              b = re.match(r'[-*]\s+(.*)', line)
              if h:
                  close(); body.append(f'        <p>{esc(h.group(1).strip())}</p>')
              elif b:
                  if not in_ul:
                      body.append('        <ul>'); in_ul = True
                  it = inline(b.group(1))
                  if it:
                      body.append(f'          <li>{it}</li>')
              else:
                  close(); body.append(f'        <p>{esc(line)}</p>')
          close()
          desc = '\n'.join(body) or '        <p>See the release on GitHub for details.</p>'

          block = (f'  <releases>\n    <release version="{version}" date="{date}">\n'
                   f'      <description>\n{desc}\n      </description>\n    </release>\n  </releases>')
          xml = open(meta, encoding='utf-8').read()
          xml = re.sub(r'[ \t]*<releases>.*?</releases>', lambda _: block, xml, flags=re.S)
          open(meta, 'w', encoding='utf-8').write(xml)
          print(f'injected {version} notes into {meta}')
          PY

      - name: Vendored source tarball (also builds frontend + vendor/)
        run: ./build/flatpak/make-vendored-tarball.sh "$VERSION"

      - name: Linux binary + archive
        run: |
          mkdir -p dist
          # Stamp the release version into the embedded version.txt (the
          # tarball step above restored it to "dev").
          printf '%s\n' "$VERSION" > version.txt
          go build -mod=vendor -trimpath -buildvcs=false \
            -tags desktop,production,webkit2_41 -ldflags "-s -w" \
            -o dist/novelide .
          tar -C dist -czf "dist/novelide-$VERSION-linux-amd64.tar.gz" novelide
          rm dist/novelide
          # --- Flathub publishing temporarily disabled ---
          # The vendored source tarball is still built above (the flatpak
          # job needs it) but is NOT attached to the release. Re-enable
          # Flathub distribution by uncommenting the copy below.
          # cp build/flatpak/novelide-"$VERSION"-vendored.tar.xz \
          #    build/flatpak/novelide-"$VERSION"-vendored.tar.xz.sha256 dist/

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*

      - name: Upload vendored source for the flatpak job
        uses: actions/upload-artifact@v4
        with:
          name: vendored-src
          path: build/flatpak/novelide-*-vendored.tar.xz
          retention-days: 7

  windows:
    name: Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Accept SemVer tags: vX.Y.Z with an optional -prerelease and/or
          # +build-metadata suffix — e.g. v1.0.0, v1.0.0-alpha.1,
          # v1.0.0-beta.1, v1.0.0-rc.1+g1a2b3c4.
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "tag '$TAG' is not a SemVer vX.Y.Z[-prerelease][+build]" >&2
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\go\bin"
          # Stamp the release version into the embedded version.txt.
          $env:VERSION | Out-File -Encoding ascii -NoNewline version.txt
          wails build -platform windows/amd64 -clean

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path build/bin/novelide.exe `
            -DestinationPath "dist/novelide-$env:VERSION-windows-amd64.zip"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*

  macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Accept SemVer tags: vX.Y.Z with an optional -prerelease and/or
          # +build-metadata suffix — e.g. v1.0.0, v1.0.0-alpha.1,
          # v1.0.0-beta.1, v1.0.0-rc.1+g1a2b3c4.
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "tag '$TAG' is not a SemVer vX.Y.Z[-prerelease][+build]" >&2
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build (universal — Intel + Apple Silicon)
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          # Stamp the release version into the embedded version.txt.
          printf '%s\n' "$VERSION" > version.txt
          wails build -platform darwin/universal -clean

      - name: Package
        run: |
          mkdir -p dist
          # ditto is the macOS-correct way to zip a .app bundle (preserves
          # symlinks and bundle structure that plain zip would mangle).
          ditto -c -k --keepParent build/bin/novelide.app \
            "dist/novelide-$VERSION-macos-universal.zip"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/*

  flatpak:
    name: Flatpak bundle
    needs: linux
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - name: Validate tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Accept SemVer tags: vX.Y.Z with an optional -prerelease and/or
          # +build-metadata suffix — e.g. v1.0.0, v1.0.0-alpha.1,
          # v1.0.0-beta.1, v1.0.0-rc.1+g1a2b3c4.
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "tag '$TAG' is not a SemVer vX.Y.Z[-prerelease][+build]" >&2
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Fetch vendored source
        uses: actions/download-artifact@v4
        with:
          name: vendored-src

      - name: Unpack source tree
        run: |
          tar -xJf "novelide-$VERSION-vendored.tar.xz"
          mv "novelide-$VERSION-vendored" src

      - name: Install Go SDK extension
        run: |
          flatpak install -y --noninteractive flathub \
            org.freedesktop.Sdk.Extension.golang//25.08 || \
          flatpak install -y --noninteractive --user flathub \
            org.freedesktop.Sdk.Extension.golang//25.08

      - name: flatpak-builder
        run: |
          flatpak-builder --force-clean --repo=repo --disable-rofiles-fuse \
            build-dir src/build/flatpak/dev.kilgore.NovelIDE.yml

      - name: Bundle
        run: |
          mkdir -p dist
          flatpak build-bundle repo "dist/novelide-$VERSION.flatpak" dev.kilgore.NovelIDE

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-flatpak
          path: dist/*

  release:
    name: Attach artifacts to the release
    needs: [linux, windows, macos, flatpak]
    # Attach as long as the three native builds succeeded; the flatpak
    # bundle (most fragile — external container, network) is added if it
    # made it, but its failure never blocks the release.
    if: >-
      always() &&
      needs.linux.result == 'success' &&
      needs.windows.result == 'success' &&
      needs.macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Gather all platform archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      # The release is authored and published by hand first; the tag push is
      # what triggers this pipeline. So this step only uploads the built
      # archives to the existing release — it must NOT regenerate or overwrite
      # the body, and it leaves the draft/prerelease/title exactly as set on
      # the release. (No `generate_release_notes`, `body`, or `prerelease`
      # inputs: softprops only patches the fields it's given, preserving the
      # rest.)
      - name: Attach build archives to the existing release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
